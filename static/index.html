<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор Текста по Регулярному Выражению</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>Генератор Текста по Регулярному Выражению</h1>
    
    <div class="input-row">
      <input type="text" id="pattern" placeholder="Введите regex паттерн...">
      <button id="clearBtn" class="btn clear" title="Очистить">✕</button>
      <button id="generateBtn" class="btn">Сгенерировать</button>
    </div>
    
    <div class="results-container">
      <div class="result-box">
        <div class="result-header">✅ Принятые</div>
        <div id="accepted" class="result-content"></div>
      </div>
      
      <div class="result-box">
        <div class="result-header">❌ Отклонённые</div>
        <div id="rejected" class="result-content"></div>
      </div>
    </div>
  </div>
  
  <script src="/static/app.js"></script>
</body>
</html>
